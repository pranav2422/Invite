<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>वास्तु शांती निमंत्रण</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi&family=Yatra+One&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Tiro Devanagari Marathi', serif;
    background:linear-gradient(135deg,#5b0f0f,#2c0505);
}

/* SCROLL INTRO */
#scrollIntro{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#2c0505;
    overflow:hidden;
}

/* GOLD PARTICLES */
.particles span{
    position:absolute;
    width:4px;
    height:4px;
    background:#d4af37;
    border-radius:50%;
    opacity:0;
    animation:float 6s linear infinite;
}
@keyframes float{
    0%{transform:translateY(50px);opacity:0}
    50%{opacity:1}
    100%{transform:translateY(-100vh);opacity:0}
}

/* SCROLL */
.scroll{
    width:90%;
    max-width:400px;
    height:0;
    background:#fff8e7;
    border-radius:10px;
    overflow:hidden;
    border:2px solid #d4af37;
    transition:height 1.8s ease;
}

/* ROLLS */
.roll{
    position:absolute;
    width:100%;
    height:40px;
    background:linear-gradient(#d4af37,#b8962e);
    border-radius:50%;
}
.roll.top{top:50%;}
.roll.bottom{bottom:50%;}

/* OPEN */
.open .scroll{height:400px;}
.open .roll.top{transform:translateY(-200px);transition:1.8s;}
.open .roll.bottom{transform:translateY(200px);transition:1.8s;}

/* CONTENT */
.scroll-content{
    text-align:center;
    padding:20px;
    opacity:0;
    transition:opacity 1s ease 1s;
}
.open .scroll-content{opacity:1;}

/* GANPATI */
.ganpati{
    width:70px;
    margin-bottom:10px;
}

/* HANDWRITTEN STYLE */
.handwritten{
    font-family:'Yatra One', cursive;
    font-size:24px;
}

/* MAIN PAGE */
#main{
    display:none;
    padding:20px;
}

/* CARD */
.card{
    max-width:420px;
    margin:auto;
    background:#fff8e7;
    border-radius:20px;
    padding:25px;
    border:2px solid #d4af37;
    text-align:center;
}

/* SLIDER */
.gallery{
    position:relative;
    height:220px;
    overflow:hidden;
}
.gallery img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:contain;
    opacity:0;
    transition:opacity 1s;
}
.gallery img.active{opacity:1;}

</style>
</head>

<body>

<!-- SCROLL INTRO -->
<div id="scrollIntro">

<!-- PARTICLES -->
<div class="particles">
<span style="left:10%"></span>
<span style="left:30%"></span>
<span style="left:50%"></span>
<span style="left:70%"></span>
<span style="left:90%"></span>
</div>

<div class="roll top"></div>

<div class="scroll" id="scrollBox">
<div class="scroll-content">

<img src="ganpati.jpeg" class="ganpati">

<div class="handwritten">वास्तु शांती निमंत्रण</div>
<p>डिसाले कुटुंब आपल्याला सप्रेम निमंत्रण देते</p>

</div>
</div>

<div class="roll bottom"></div>

</div>

<!-- MAIN -->
<div id="main">
<div class="card">

<h2 class="handwritten">वास्तु शांती पूजा</h2>

<div class="gallery" id="gallery">
<img src="house1.jpg" class="active">
<img src="house2.jpg">
<img src="house3.jpg">
</div>

<p>
देवाच्या कृपेने व मोठ्यांच्या आशीर्वादाने,<br>
आमच्या नवीन घरासाठी आपणास सप्रेम निमंत्रण
</p>

<p>
📅 २५ डिसेंबर २०२६<br>
⏰ सकाळी १० वाजल्यापासून
</p>

<p>📍 आपला पत्ता येथे</p>

</div>
</div>

<script>
/* SCROLL OPEN */
setTimeout(()=>{
document.getElementById("scrollIntro").classList.add("open");
},300);

/* SWITCH PAGE */
setTimeout(()=>{
document.getElementById("scrollIntro").style.display="none";
document.getElementById("main").style.display="block";
},3500);

/* SLIDER */
let slides=document.querySelectorAll("#gallery img");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
</script>

</body>
</html>
