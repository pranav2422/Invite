<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vastu Shanti Invitation</title>

<style>
body {
    margin: 0;
    font-family: 'Helvetica Neue', sans-serif;
    background: #0e0e0e;
    color: #fff;
}

/* DOOR INTRO */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    display: flex;
    z-index: 10;
}

.door {
    width: 50%;
    height: 100%;
    background: linear-gradient(145deg, #2b2b2b, #111);
    transition: transform 1.5s ease-in-out;
}

.open .left { transform: translateX(-100%); }
.open .right { transform: translateX(100%); }

.tap-text {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 60%;
    font-size: 16px;
    letter-spacing: 2px;
    opacity: 0.7;
}

/* MAIN */
#main {
    display: none;
    padding: 20px;
}

/* CARD */
.card {
    max-width: 420px;
    margin: auto;
}

/* SLIDER */
.slider {
    overflow: hidden;
    border-radius: 12px;
}

.slider img {
    width: 100%;
    display: none;
}

.slider img.active {
    display: block;
}

/* TEXT */
h2 {
    text-align: center;
    font-weight: 500;
}

p {
    text-align: center;
    color: #ccc;
    line-height: 1.6;
}

/* BUTTON */
.btn {
    display: block;
    margin: 20px auto;
    padding: 12px;
    text-align: center;
    border: 1px solid #fff;
    border-radius: 30px;
    color: white;
    text-decoration: none;
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="doorSound" src="https://assets.mixkit.co/sfx/preview/mixkit-door-opening-199.mp3"></audio>
<audio id="bgMusic" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>

<!-- INTRO -->
<div id="intro" onclick="openDoor()">
    <div class="door left"></div>
    <div class="door right"></div>
    <div class="tap-text">Tap to Enter</div>
</div>

<!-- MAIN -->
<div id="main">

<div class="card">

    <!-- SLIDER -->
    <div class="slider" id="slider">
        <img src="house1.jpg" class="active">
        <img src="house2.jpg">
        <img src="house3.jpg">
    </div>

    <h2>Vastu Shanti Pooja</h2>

    <p>
        With the blessings of God & elders,<br>
        we invite you to our new home
    </p>

    <p>
        25 December 2026<br>
        10:00 AM onwards
    </p>

    <p>
        Your Address Here
    </p>

    <a class="btn" href="https://maps.google.com" target="_blank">
        View Location
    </a>

</div>

</div>

<script>
function openDoor() {
    document.getElementById("intro").classList.add("open");

    document.getElementById("doorSound").play();
    document.getElementById("bgMusic").play();

    setTimeout(() => {
        document.getElementById("intro").style.display = "none";
        document.getElementById("main").style.display = "block";
    }, 1500);
}

/* AUTO SLIDE */
let slides = document.querySelectorAll(".slider img");
let index = 0;

setInterval(() => {
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}, 3000);

/* SWIPE SUPPORT */
let startX = 0;

document.getElementById("slider").addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

document.getElementById("slider").addEventListener("touchend", e => {
    let endX = e.changedTouches[0].clientX;

    if(startX > endX + 50){
        nextSlide();
    } else if(startX < endX - 50){
        prevSlide();
    }
});

function nextSlide(){
    slides[index].classList.remove("active");
    index = (index + 1) % slides.length;
    slides[index].classList.add("active");
}

function prevSlide(){
    slides[index].classList.remove("active");
    index = (index - 1 + slides.length) % slides.length;
    slides[index].classList.add("active");
}
</script>

</body>
</html>
