<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>वास्तु शांती निमंत्रण</title>

<link href="https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Marathi&family=Yatra+One&display=swap" rel="stylesheet">

<style>
:root{
    --gold:#d4af37;
}

body{
    margin:0;
    font-family:'Tiro Devanagari Marathi', serif;
    background:linear-gradient(135deg,#5b0f0f,#2c0505);
}

/* ===== SCROLL ===== */
#scrollIntro{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#2c0505;
    z-index:10;
}

/* PARTICLES */
.particles span{
    position:absolute;
    width:4px;height:4px;
    background:var(--gold);
    border-radius:50%;
    animation:float 6s linear infinite;
}
@keyframes float{
    0%{transform:translateY(40px);opacity:0}
    50%{opacity:0.8}
    100%{transform:translateY(-100vh);opacity:0}
}

/* SCROLL BOX */
.scroll{
    width:90%;
    max-width:420px;
    height:0;
    background:#fff8e7;
    border-radius:14px;
    border:2px solid var(--gold);
    overflow:hidden;
    transition:height 1.6s ease;
    padding-top:20px; /* FIX spacing */
}

/* ROLL */
.roll{
    position:absolute;
    width:100%;
    height:40px;
    background:linear-gradient(#d4af37,#b8962e);
    border-radius:50%;
}
.roll.top{top:50%}
.roll.bottom{bottom:50%}

.open .scroll{height:380px;}
.open .roll.top{transform:translateY(-190px);transition:1.6s;}
.open .roll.bottom{transform:translateY(190px);transition:1.6s;}

/* CONTENT */
.scroll-content{
    text-align:center;
    opacity:0;
    padding:20px;
    transition:opacity 1s ease 1s;
}
.open .scroll-content{opacity:1}

/* GANPATI FIX */
.ganpati{
    width:80px;
    display:block;
    margin:0 auto 15px; /* FIX spacing */
}

/* HANDWRITTEN */
.handwritten{
    font-family:'Yatra One', cursive;
    font-size:24px;
}

/* ===== MAIN ===== */
#main{
    display:none;
    min-height:100vh;
    padding:20px;
    background:
        radial-gradient(circle at top, rgba(212,175,55,0.15), transparent 60%),
        linear-gradient(135deg,#5b0f0f,#2c0505);
}

/* CARD */
.card{
    max-width:420px;
    margin:auto;
    background:#fff8e7;
    border-radius:18px;
    padding:25px;
    border:2px solid var(--gold);
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* ===== IMAGE FIX (IMPORTANT) ===== */
.gallery{
    position:relative;
    width:100%;
    height:240px;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#000;
    border-radius:10px;
    overflow:hidden;
}

.gallery img{
    position:absolute;
    max-width:100%;
    max-height:100%;
    object-fit:contain; /* FULL IMAGE */
    opacity:0;
    transition:opacity 1s;
}

.gallery img.active{
    opacity:1;
}

/* TEXT */
p{
    line-height:1.7;
    color:#4b2e2e;
}

h2{
    margin:10px 0;
}

/* BUTTON */
.btn{
    margin-top:12px;
    padding:10px 18px;
    border-radius:25px;
    border:1px solid var(--gold);
    text-decoration:none;
    color:#4b2e2e;
    display:inline-block;
}

</style>
</head>

<body>

<!-- SCROLL INTRO -->
<div id="scrollIntro">

<div class="particles">
<span style="left:15%"></span>
<span style="left:40%"></span>
<span style="left:70%"></span>
</div>

<div class="roll top"></div>

<div class="scroll">
<div class="scroll-content">

<img src="ganpati.jpeg" class="ganpati">

<div class="handwritten">वास्तु शांती निमंत्रण</div>
<p>डिसाले कुटुंब आपल्याला सप्रेम निमंत्रण देते</p>

</div>
</div>

<div class="roll bottom"></div>

</div>

<!-- MAIN -->
<div id="main">
<div class="card">

<h2 class="handwritten">वास्तु शांती पूजा</h2>

<div class="gallery" id="gallery">
<img src="house1.jpg" class="active">
<img src="house2.jpg">
<img src="house3.jpg">
</div>

<p>
देवाच्या कृपेने व मोठ्यांच्या आशीर्वादाने,<br>
आमच्या नवीन घरासाठी आपणास सप्रेम निमंत्रण
</p>

<p>
📅 २५ डिसेंबर २०२६<br>
⏰ सकाळी १० वाजल्यापासून
</p>

<p>📍 आपला पत्ता येथे</p>

<a class="btn" href="https://www.google.com/maps?q=your+address" target="_blank">
लोकेशन पहा
</a>

</div>
</div>

<script>
setTimeout(()=>{
document.getElementById("scrollIntro").classList.add("open");
},300);

setTimeout(()=>{
document.getElementById("scrollIntro").style.display="none";
document.getElementById("main").style.display="block";
},3300);

/* SLIDER */
let slides=document.querySelectorAll("#gallery img");
let i=0;

setInterval(()=>{
slides[i].classList.remove("active");
i=(i+1)%slides.length;
slides[i].classList.add("active");
},3000);
</script>

</body>
</html>
